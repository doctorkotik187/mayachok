{% extends "base.html" %}

{% block title %}{{tr.app-name}}{% endblock %}

{% block body %}
<section class="section">
    <div class="container has-text-centered">
        <div class="card result-card">
            <div class="card-content has-text-centered">
                <div class="mascot">🐻</div>
                <h1 class="title is-3">{{tr.region-thanks-title}}</h1>
                <p class="content">{{tr.region-thanks-text}}</p>
                <div class="buttons is-centered">
                    <a class="button is-primary is-rounded" href="/">{{tr.retake}}</a>
                    <a class="button is-light is-rounded" href="/map">{{tr.region-view-map}}</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
