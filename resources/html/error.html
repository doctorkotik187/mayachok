{% extends "base.html" %}

{% block title %}Error{% endblock %}

{% block body %}
<section class="section">
    <div class="container">
        <div class="notification is-danger">
            <h1 class="title is-4">Error: {{status}}</h1>
            {% if title %}
            <h2 class="title is-5">{{title}}</h2>
            {% endif %}
            {% if message %}
            <p>{{message}}</p>
            {% endif %}
        </div>
    </div>
</section>
{% endblock %}
