<!DOCTYPE html>
<html lang="{{locale}}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Маячок{% endblock %}</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link href="/css/screen.css" rel="stylesheet" type="text/css" />
    {% block extra_head %}{% endblock %}
</head>
<body>
<nav class="navbar is-transparent" role="navigation" aria-label="main navigation">
  <div class="container">
    <div class="navbar-brand">
      <a class="navbar-item" href="/">
        <strong>{{tr.app-name}}</strong>
      </a>
    </div>
    <div class="navbar-menu">
      <div class="navbar-end">
        <a class="navbar-item" href="/map?locale={{locale}}">{{tr.nav-map}}</a>
      </div>
    </div>
  </div>
</nav>
{% block body %}{% endblock %}
{% block extra_body %}{% endblock %}
<footer class="footer has-text-centered" style="padding: 1.5rem;">
  <p class="is-size-7">
    <a href="/api/api-docs/index.html" target="_blank" rel="noopener">📄 API</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/doctorkotik187/mayachok/issues/new" target="_blank" rel="noopener">🐛 {{tr.report-bug}}</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/doctorkotik187/mayachok" target="_blank" rel="noopener">⭐ GitHub</a>
  </p>
</footer>
</body>
</html>
