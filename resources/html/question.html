{% extends "base.html" %}

{% block title %}{{tr.question-title}}{% endblock %}

{% block body %}
<section class="section">
    <div class="container question-container">
        <div class="progress-bar">
            <progress class="progress is-primary" value="{{progress}}" max="100">{{progress}}%</progress>
            <span class="progress-text">{{q-num}}/10</span>
        </div>

        <h2 class="title is-5 question-number">{{tr.question-of}}</h2>
        <h3 class="title is-4 question-text">{{question-text}}</h3>

        <form method="post" action="/screening/answer">
            {% csrf-field %}
            <input type="hidden" name="locale" value="{{locale}}" />
            <input type="hidden" name="q" value="{{q-num}}" />
            <input type="hidden" name="answers" value='{{answers}}' />

            <div class="options">
                {% for option in options %}
                {% with idx=forloop.counter0 %}
                <label class="option">
                    <input type="radio" name="answer" value="{{idx}}" required />
                    <span class="option-text">{{option}}</span>
                </label>
                {% endwith %}
                {% endfor %}
            </div>

            <div class="buttons is-right">
                <button class="button is-primary is-rounded" type="submit">
                    {% if q-num = 10 %}{{tr.finish-button}}{% else %}{{tr.next-button}}{% endif %}
                </button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
