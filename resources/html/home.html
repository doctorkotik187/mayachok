<!DOCTYPE html>
<html lang="{{locale}}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{tr.app-name}}</title>
    <link href="/css/screen.css" rel="stylesheet" type="text/css" />
</head>
<body class="landing">
    <div class="landing-inner">
        <div class="mascot">🐻</div>
        <h1>{{tr.app-name}}</h1>
        <p class="tagline">{{tr.tagline}}</p>
        <p class="description">{{tr.description}}</p>
        <form method="get" action="/screening">
            <input type="hidden" name="locale" value="{{locale}}" />
            <button class="btn btn-primary" type="submit">{{tr.start-button}}</button>
        </form>
        <div class="lang-switch">
            {% if locale = "ru" %}
            <a href="/?locale=en">{{tr.lang-switch}}</a>
            {% else %}
            <a href="/?locale=ru">{{tr.lang-switch}}</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
