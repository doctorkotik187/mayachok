<!DOCTYPE html>
<html lang="{{locale}}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{tr.app-title}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link href="/css/screen.css" rel="stylesheet" type="text/css" />
</head>
<body class="landing">
    <section class="hero is-fullheight">
        <div class="hero-body">
            <div class="container has-text-centered landing-inner">
                <div class="mascot">🐻</div>
                <h1 class="title is-1">{{tr.app-name}}</h1>
                <p class="subtitle is-5">{{tr.tagline}}</p>
                <div class="content description">
                    <p>{{tr.description}}</p>
                </div>
                <form method="get" action="/screening">
                    <input type="hidden" name="locale" value="{{locale}}" />
                    <button class="button is-primary is-rounded is-medium" type="submit">{{tr.start-button}}</button>
                </form>
                <div class="lang-switch">
                    {% if locale = "ru" %}
                    <a href="/?locale=en">English</a>
                    <span class="lang-sep">·</span>
                    <a href="/?locale=de">Deutsch</a>
                    {% elif locale = "en" %}
                    <a href="/?locale=ru">Русский</a>
                    <span class="lang-sep">·</span>
                    <a href="/?locale=de">Deutsch</a>
                    {% else %}
                    <a href="/?locale=ru">Русский</a>
                    <span class="lang-sep">·</span>
                    <a href="/?locale=en">English</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </section>
</body>
</html>
