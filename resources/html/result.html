<!DOCTYPE html>
<html lang="{{locale}}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ваш результат — Маячок</title>
    <link href="/css/screen.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <div id="screen" class="result-container">
        <div class="result-card">
            <div class="result-header">
                <div class="mascot">🐻</div>
                <h1>Ваш результат</h1>
            </div>

            <div class="score-circle" style="border-color: {{risk-color}}">
                <span class="score-number">{{total-score}}</span>
                <span class="score-max">/30</span>
            </div>

            <div class="risk-badge" style="background-color: {{risk-color}}">
                {{risk-label}}
            </div>

            <p class="recommendation">{{recommendation}}</p>

            {% if show-crisis %}
            <div class="crisis-alert">
                <h2>🆘 Пожалуйста, позвоните сейчас</h2>
                <p><strong>{{crisis.label}}</strong></p>
                <p class="crisis-phone">{{crisis.phone}}</p>
                {% if crisis.spb %}
                <p>{{crisis.spb}}</p>
                {% endif %}
            </div>
            {% endif %}

            <div class="result-actions">
                <a class="btn btn-primary" href="/">Пройти заново</a>
            </div>
        </div>
    </div>
</body>
</html>
